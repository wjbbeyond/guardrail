name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test -race -shuffle=on -count=1 ./...
      - name: Build
        run: go build -trimpath ./cmd/guardrail
